import sys
import asyncio
import platform
import json
from pathlib import Path

# do not rename
async def custom_site():
    import embed
    platform.document.body.style.background = "#000000"

    platform.window.transfer.hidden = true
    platform.window.canvas.style.visibility = "visible"

    bundle = "game_web_build"

    # the C or js loader could do that but be explicit.
    appdir = Path(f"/data/data/{bundle}") # /data/data/game_web_build
    appdir.mkdir()

    # unpack filesystem from compressed archive into work dir
    if platform.window.location.host.find('.itch.zone')>0:
        import zipfile
        async with platform.fopen("game_web_build.apk", "rb") as archive:
            with zipfile.ZipFile(archive) as zip_ref:
                zip_ref.extractall(appdir.as_posix())
    else:
        import tarfile
        async with platform.fopen("game_web_build.tar.gz", "rb") as archive:
            tar = tarfile.open(fileobj=archive, mode="r:gz")
            tar.extractall(path=appdir.as_posix(), filter='tar')
            tar.close()

    # preloader will change to work dir and prepend it to sys.path
    platform.run_main(PyConfig, loaderhome= appdir / "assets", loadermain=None)

    # wait preloading complete : that includes images and wasm compilation of bundled modules
    while embed.counter()<0:
        await asyncio.sleep(.1)

    main = appdir / "assets" / "main.py"

    # TODO: test for window.webkitAudioContext and block aio loop until gesture if accessing media manager play
    # before a gesture is recorded ( touch or click )

    # test/wait user media interaction
    if not platform.window.MM.UME:

        # now that apk is mounted we have access to font cache
        # but we need to fill __file__ that is not yet set
        __import__(__name__).__file__ = main

        # now make a prompt
        msg  = "Ready to start ! Please click/touch page"
        platform.window.infobox.innerText = msg
        print("\n"*4, f"    * Waiting for media user engagement. {msg} *" , "\n"*4)

        while not platform.window.MM.UME:
            await asyncio.sleep(.1)

    # start async top level machinery if not started and add a console in any case if requested.
    await TopLevel_async_handler.start_toplevel(platform.shell, console=window.python.config.debug)

    # now that apk is mounted we have access to font cache
    # but we need to fill __file__/__name__ that are not yet set
    __import__(__name__).__file__ = main

    def ui_callback(pkg):
        platform.window.infobox.innerText = f"installing {pkg}"

    await shell.source(main, callback=ui_callback)

    # if you don't reach that step
    # your main.py has an infinite sync loop somewhere !

    platform.window.infobox.style.display = "none"
    platform.window.config.gui_divider = 1
    platform.window.window_resize()
    print("default.tmpl: done")

    shell.interactive()

asyncio.run( custom_site() )

    infobox.style.top = top + "px";

globalThis.__canvas_resized = (self, ecw, ech) => {
        console.warn("TODO: panda3d canvas monitor", self, ecw, ech)
    }

    function logViewport(tag) {}
    // ---- Enforce canvas size via MutationObserver ----
    (function installEnforcer() {
        var c = document.getElementById("canvas");
        if (!c) { setTimeout(installEnforcer, 50); return; }

        var realSet = c.style.setProperty.bind(c.style);

        // Tag our own writes so we can skip self-triggered mutations.
        c.style.setProperty = function(prop, val, prio) {
            c.__ourWrite = true;
            return realSet(prop, val, prio);
        };

        function enforce() {
            var vv = window.visualViewport;
            var w = vv ? vv.width  : window.innerWidth;
            var vh = vv ? vv.height : window.innerHeight;
            // Skip until viewport has settled to a clearly landscape shape.
            if (w <= vh * 1.2) return;
            var fbRatio = 720 / 1280;  // desktop framebuffer height/width
            var h = w * fbRatio;
            if (h > vh) { h = vh; w = h / fbRatio; }
            logViewport("enforce:calc w=" + Math.round(w) + " h=" + Math.round(h));
            var wantW = w + "px";
            var wantH = h + "px";
            if (c.style.width !== wantW || c.style.height !== wantH) {
                logViewport("enforce:writing");
                c.__ourWrite = true;
                realSet("width",  wantW, "important");
                c.__ourWrite = true;
                realSet("height", wantH, "important");
            }
        }

        var observer = new MutationObserver(function(mutations) {
            // If the change came from our setProperty, ignore it.
            if (c.__ourWrite) { c.__ourWrite = false; return; }
            // Someone else wrote. Re-enforce.
            enforce();
        });
        observer.observe(c, { attributes: true, attributeFilter: ["style"] });
        logViewport("enforcer:installed");
    })();

    function force_canvas_size() {
        logViewport("fcs:enter");
        if (typeof config !== 'undefined') {
            config.fb_width = "1280";
            config.fb_height = "720";
            config.fb_ar = 1.7778;
            config.gui_divider = 1;
        }
        var c3d = document.getElementById("canvas3d");
        if (c3d) { c3d.width = 1280; c3d.height = 720; }
        if (typeof window_resize === 'function') {
            try { window_resize(); } catch(e) {}
        }
        // Override whatever pygbag just wrote. Let the browser letterbox
        // via object-fit:contain to preserve our 1280x720 framebuffer aspect.
       var c = document.getElementById("canvas");
            if (c) {
                var vv = window.visualViewport;
                var w = vv ? vv.width  : window.innerWidth;
                var h = vv ? vv.height : window.innerHeight;
                // Bail out if the viewport hasn't settled to a clearly
                // landscape shape yet.
                if (w > h * 1.2) {
                    c.style.setProperty("width",  w + "px", "important");
                    c.style.setProperty("height", h + "px", "important");
                    logViewport("fcs:wrote " + Math.round(w) + "x" + Math.round(h));
                } else {
                    logViewport("fcs:skip-square " + Math.round(w) + "x" + Math.round(h));
                }
            }
        logViewport("fcs:after-override");
        // Do NOT re-dispatch "resize" — that caused the earlier log flood
        // and could re-trigger pygbag's bad math.
    }

    function settle_and_resize() {
        logViewport("settle:enter");
        requestAnimationFrame(function() {
            requestAnimationFrame(function() {
                logViewport("settle:after-2xrAF");
                force_canvas_size();
                setTimeout(function() { logViewport("settle:+250"); force_canvas_size(); }, 250);
                setTimeout(function() { logViewport("settle:+800"); force_canvas_size(); }, 800);
                setTimeout(function() { logViewport("settle:+1600"); force_canvas_size(); }, 1600);
            });
        });
    }

    window.addEventListener("DOMContentLoaded", function() {
        logViewport("DOMContentLoaded");
        force_canvas_size();
    });
    window.addEventListener("load", function() {
        logViewport("load");
        settle_and_resize();
    });
    window.addEventListener("resize", function() {
        logViewport("resize");
        force_canvas_size();
    });
    window.addEventListener("orientationchange", function() {
        logViewport("orientationchange");
        settle_and_resize();
    });
    if (window.visualViewport) {
        window.visualViewport.addEventListener("resize", function() {
            logViewport("vv:resize");
            force_canvas_size();
        });
    }

    async function custom_onload(debug_hidden) {
        logViewport("custom_onload:enter");
        console.log(__FILE__, "custom_onload");
        force_canvas_size();
        setTimeout(force_canvas_size, 100);
        setTimeout(force_canvas_size, 600);

        pyconsole.hidden = debug_hidden
        system.hidden = debug_hidden
        transfer.hidden = debug_hidden
        info.hidden = debug_hidden
        box.hidden =  debug_hidden

        show_infobox()
        logViewport("custom_onload:exit");
    }
