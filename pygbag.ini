[pygbag]
# Title shown in browser tab -- match config/game_config.json's display.title
title = My GameJam Game

# Package name (snake_case, no spaces)
package = my_gamejam_game

# Window dimensions -- must match config/game_config.json's display.width/height
width = 1280
height = 720

[DEPENDENCIES]
# Folders pygbag should not scan/bundle when run directly against the
# project root (`pygbag .`). TOOLS/build_web_mobile.py sidesteps this
# entirely by staging a clean copy first, so this list mainly matters for
# ad hoc local preview runs.
ignoredirs = ["TOOLS", "WEB_BUILD", "tests", ".git", ".claude", "__pycache__", ".pytest_cache", "build", ".venv", "venv"]
ignorefiles = [".DS_Store", "Thumbs.db"]
